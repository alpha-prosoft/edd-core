<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Developer prophet illustration</title>
  <desc id="desc">A stylized developer prophet with glasses, beard, hoodie, and stone tablets showing immutable data flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="tablet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="960" height="640" fill="url(#bg)" rx="28"/>
  <circle cx="480" cy="160" r="120" fill="url(#glow)" filter="url(#soft)" opacity="0.9"/>

  <path d="M0 520 C180 470 260 560 400 540 C560 515 680 455 960 520 L960 640 L0 640 Z" fill="#111827"/>
  <path d="M0 560 C170 520 280 595 430 575 C600 555 740 500 960 565 L960 640 L0 640 Z" fill="#0b1220"/>

  <g transform="translate(480 170)">
    <circle cx="0" cy="0" r="70" fill="#f1c27d"/>
    <path d="M-74 -8 C-78 -58 -35 -100 0 -100 C42 -100 78 -62 74 -10 C60 -38 34 -58 0 -58 C-32 -58 -56 -40 -74 -8 Z" fill="#cbd5e1"/>
    <path d="M-42 10 C-36 -4 -18 -12 0 -12 C22 -12 38 -2 44 16 C48 30 44 60 18 88 C6 102 -10 102 -22 88 C-40 64 -48 32 -42 10 Z" fill="#f8fafc"/>
    <rect x="-42" y="-2" width="30" height="18" rx="8" fill="none" stroke="#0f172a" stroke-width="5"/>
    <rect x="12" y="-2" width="30" height="18" rx="8" fill="none" stroke="#0f172a" stroke-width="5"/>
    <line x1="-12" y1="7" x2="12" y2="7" stroke="#0f172a" stroke-width="4"/>
    <circle cx="-27" cy="7" r="3" fill="#0f172a"/>
    <circle cx="27" cy="7" r="3" fill="#0f172a"/>
    <path d="M-8 24 Q0 30 8 24" stroke="#7c2d12" stroke-width="3" fill="none"/>
  </g>

  <g transform="translate(480 335)">
    <path d="M-150 210 C-125 85 -72 20 0 20 C72 20 125 85 150 210 Z" fill="#2563eb"/>
    <path d="M-68 30 C-55 74 -24 118 0 150 C28 118 57 74 70 30" fill="none" stroke="#dbeafe" stroke-width="10" stroke-linecap="round"/>
    <rect x="-170" y="40" width="128" height="166" rx="16" fill="url(#tablet)" stroke="#64748b" stroke-width="6" transform="rotate(-12)"/>
    <rect x="42" y="40" width="128" height="166" rx="16" fill="url(#tablet)" stroke="#64748b" stroke-width="6" transform="rotate(12)"/>

    <g transform="translate(-108 120) rotate(-12)">
      <circle cx="0" cy="-24" r="13" fill="#0f172a"/>
      <path d="M-30 16 C-14 -4 14 -4 30 16" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
      <path d="M-34 48 L34 48" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
      <path d="M-18 80 L18 80" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    </g>

    <g transform="translate(108 120) rotate(12)">
      <path d="M-36 -34 L-8 -62 L20 -34" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M-28 -6 C-6 -22 6 -22 28 -6" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
      <path d="M-18 24 C-2 10 2 10 18 24" fill="none" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
      <path d="M-10 56 C0 46 0 46 10 56" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
    </g>

    <rect x="-46" y="210" width="92" height="22" rx="11" fill="#1e3a8a"/>
  </g>

  <g fill="#f8fafc" opacity="0.8" font-family="Arial, sans-serif" text-anchor="middle">
    <text x="480" y="560" font-size="28" font-weight="700">immutability</text>
    <text x="480" y="592" font-size="16">A developer meets the tablets of explicit state</text>
  </g>
</svg>
